runtime:
  config_profile: dev
  shared_config_entrypoint: src.config.get_settings
  trader_run_id_generation: uuid4
  trader_run_id_bind_to_logs: true
  trader_run_id_bind_to_audit: true

app:
  name: signalark
  env: dev
  timezone: Asia/Shanghai

trading:
  exchange: cn_equity
  market: a_share
  execution_mode: paper
  account_id: paper_account_001
  primary_strategy_id: baseline_momentum_v1
  supported_symbols:
    - 600036.SH
    - 000001.SZ
  symbols:
    - 600036.SH
  primary_timeframe: 15m
  market_data_mode: bar
  market_data_source: eastmoney
  strategy_trigger: closed_bar
  symbol_rules:
    600036.SH:
      lot_size: 100
      qty_step: 100
      price_tick: 0.01
      min_qty: 100
      allow_odd_lot_sell: true
      t_plus_one_sell: true
      price_limit_pct: 0.10
    000001.SZ:
      lot_size: 100
      qty_step: 100
      price_tick: 0.01
      min_qty: 100
      allow_odd_lot_sell: true
      t_plus_one_sell: true
      price_limit_pct: 0.10

paper:
  state_backend: postgres
  cost_model:
    commission: 0.0003
    transfer_fee: 0.00001
    stamp_duty_sell: 0.0005
  recovery_source: local_persistent_state

api:
  host: 0.0.0.0
  port: 8000
  cors_allowed_origins:
    - http://127.0.0.1:5173
    - http://localhost:5173
    - http://127.0.0.1:4173
    - http://localhost:4173

logging:
  level: INFO
  format: json
  include_trader_run_id: true

risk:
  max_single_symbol_notional_cny: 200000
  max_total_open_notional_cny: 500000
  min_order_notional_cny: 1000
  market_stale_threshold_seconds: 120

controls:
  lease_ttl_seconds: 15
  lease_heartbeat_interval_seconds: 5

alerts:
  telegram:
    enabled: false
